services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-nextevent}
      POSTGRES_USER: ${DB_USER:-nextevent}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nextevent}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nextevent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-nextevent}
      DB_USER: ${DB_USER:-nextevent}
      DB_PASSWORD: ${DB_PASSWORD:-nextevent}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
